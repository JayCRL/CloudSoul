<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CloudSoul 登录</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa3;--accent:#6c8cff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:420px;text-align:center}
h1{font-size:24px;margin-bottom:8px}h1 span{color:var(--accent)}
p{color:var(--muted);font-size:14px;margin-bottom:24px}
input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:14px;font-family:monospace;text-align:center}
input:focus{outline:none;border-color:var(--accent)}
.btn{display:block;width:100%;margin-top:12px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{opacity:0.9}
.error{color:#f87171;font-size:13px;margin-top:12px}
.hint{color:var(--muted);font-size:12px;margin-top:16px}.hint code{background:var(--bg);padding:2px 6px;border-radius:4px}
</style>
</head>
<body>
<div class="card">
  <h1>☁ <span>CloudSoul</span></h1>
  <p>输入 Bearer Token 登录管理面板</p>
  <form method="POST" action="/dashboard/login">
    <input name="token" type="password" placeholder="cont_dev_..." autofocus>
    <button class="btn">登录</button>
  </form>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <div class="hint">Token 在 Mac mini 的 <code>~/.continuum.env</code> 里<br>或服务器启动参数 <code>CONTINUUM_BEARER_TOKEN</code></div>
</div>
</body>
</html>
